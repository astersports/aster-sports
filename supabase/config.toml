# Supabase project config. Locks per-function flags for repo-tracked
# edge functions so CI deploys preserve them.
#
# Wave 4.0.1 — without these declarations, `supabase functions deploy`
# defaults to verify_jwt:true on every CI run, regressing the
# shared-secret functions below. Three regressions in production
# this week (PR #48 briefing-cron-dispatch, PR #51 redeployed
# briefing-cron-dispatch + rsvp-token-handler) all manifested as
# 401 UNAUTHORIZED_INVALID_JWT_FORMAT at the platform layer because
# the platform rejects non-JWT Bearer tokens before the function
# code can run its own shared-secret check.
#
# Wave 4.1 — extended with two new anonymous functions
# (unsubscribe-handler, resend-webhook-receiver) shipped via MCP
# in the foundation drop. Same protection: declare verify_jwt:false
# so CI redeploys don't reset the flag.
#
# Wave 4.3-E (P0 hotfix) — added briefing-auto-draft-tick (4.3-A)
# and callup-token-handler (4.3-D). Both were omitted from this file
# on initial ship, so CI auto-deploys ran defaults (verify_jwt:true),
# blocking every invocation at the gateway with
# UNAUTHORIZED_INVALID_JWT_FORMAT. Same regression class as wave 4.0.1.
# CLAUDE.md anti-pattern #31 + the vitest audit at
# src/lib/__tests__/verifyJwtConfigAudit.test.js enforce the linkage
# so a future shared-secret function can't ship without this entry.
#
# Functions intentionally omitted from this file (default
# verify_jwt:true preserves correct behavior):
#   send-tournament-message — requires user JWT for user_roles check
#   rapid-processor         — JWT-authenticated

project_id = "vrwwpsbfbnveawqwbdmj"

[functions.briefing-cron-dispatch]
verify_jwt = false

[functions.rsvp-token-handler]
verify_jwt = false

[functions.invite-parent]
verify_jwt = false

[functions.unsubscribe-handler]
verify_jwt = false

[functions.resend-webhook-receiver]
verify_jwt = false

[functions.briefing-auto-draft-tick]
verify_jwt = false

[functions.callup-token-handler]
verify_jwt = false

