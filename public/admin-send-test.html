<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Edge Function Smoke Test</title>
<style>
  body { font-family: -apple-system, system-ui, sans-serif; max-width: 480px; margin: 40px auto; padding: 20px; color: #1a1d23; }
  h1 { font-size: 18px; margin-bottom: 8px; }
  p { font-size: 14px; color: #4a5568; line-height: 1.5; margin: 4px 0; }
  code { font-size: 12px; background: #f1f3f5; padding: 2px 6px; border-radius: 4px; word-break: break-all; }
  button { display: block; width: 100%; padding: 16px; font-size: 16px; font-weight: 600; background: #4a8fd4; color: white; border: none; border-radius: 8px; margin-top: 24px; }
  button:disabled { opacity: 0.5; }
  pre { background: #f1f3f5; padding: 12px; border-radius: 6px; font-size: 12px; overflow-x: auto; white-space: pre-wrap; word-break: break-word; margin-top: 16px; }
  .ok { color: #16A34A; }
  .err { color: #DC2626; }
</style>
</head>
<body>
<h1>send-tournament-message smoke test</h1>
<p>Message ID: <code>1b7be1bf-ca56-4239-9589-0f19c4b6857d</code></p>
<p>Recipient: <code>fsamaritano@gmail.com</code></p>
<p id="boot-status">Booting...</p>
<div id="manual-key" style="display:none; margin-top:12px;">
  <p style="font-size:13px;">Auto-extract failed. Paste the anon key (eyJ...) below:</p>
  <input id="manual-key-input" type="text" style="width:100%; padding:10px; font-size:12px; border:1px solid #E2E8F0; border-radius:6px; box-sizing:border-box;" placeholder="eyJhbGciOi... or sb_publishable_...">
  <button id="manual-key-set" type="button" style="margin-top:8px; padding:10px; background:#4A5568;">Use this key</button>
</div>
<p id="auth-status"></p>
<button id="send" disabled>Send Test Email</button>
<pre id="result"></pre>

<script>
const SUPABASE_URL = 'https://vrwwpsbfbnveawqwbdmj.supabase.co';
const MESSAGE_ID = '1b7be1bf-ca56-4239-9589-0f19c4b6857d';
const KEY_PATTERN = /(eyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+|sb_publishable_[A-Za-z0-9_-]+)/g;

const bootStatus = document.getElementById('boot-status');
const authStatus = document.getElementById('auth-status');
const sendBtn = document.getElementById('send');
const resultPre = document.getElementById('result');

let anonKey = null;
let token = null;

function pickKey(keys) {
  // Prefer sb_publishable_* (new format), then JWT with role=anon, then first match.
  const pub = keys.find(k => k.startsWith('sb_publishable_'));
  if (pub) return pub;
  for (const k of keys) {
    if (!k.startsWith('eyJ')) continue;
    try {
      const payload = JSON.parse(atob(k.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
      if (payload.role === 'anon') return k;
    } catch {}
  }
  return keys[0] ?? null;
}

async function extractAnonKey() {
  const indexHtml = await fetch('/', { cache: 'no-store' }).then(r => r.text());
  const jsPaths = [...new Set(indexHtml.match(/\/assets\/[^"'\s]+\.js/g) ?? [])];
  if (jsPaths.length === 0) throw new Error('No /assets/*.js files referenced in index.html');
  const allKeys = [];
  for (const path of jsPaths) {
    try {
      const js = await fetch(path, { cache: 'no-store' }).then(r => r.text());
      const matches = js.match(KEY_PATTERN);
      if (matches) allKeys.push(...matches);
    } catch {}
  }
  if (allKeys.length === 0) {
    throw new Error('No anon key found across ' + jsPaths.length + ' chunk(s)');
  }
  const picked = pickKey(allKeys);
  if (!picked) throw new Error('Keys found but none usable');
  return picked;
}

function loadAuthToken() {
  const authKey = Object.keys(localStorage).find(k => k.startsWith('sb-') && k.endsWith('-auth-token'));
  if (!authKey) return null;
  try { return JSON.parse(localStorage.getItem(authKey))?.access_token ?? null; }
  catch { return null; }
}

function checkAuthAndEnable() {
  token = loadAuthToken();
  if (token) {
    authStatus.textContent = '✓ Logged in. Token loaded from localStorage.';
    authStatus.className = 'ok';
    if (anonKey) sendBtn.disabled = false;
  } else {
    authStatus.textContent = '✗ Not logged in. Open app.legacyhoopers.org in another tab, log in, then refresh this page.';
    authStatus.className = 'err';
  }
}

document.getElementById('manual-key-set').addEventListener('click', () => {
  const v = document.getElementById('manual-key-input').value.trim();
  if (!v.match(/^(eyJ|sb_publishable_)/)) {
    alert('Key must start with "eyJ" or "sb_publishable_"'); return;
  }
  anonKey = v;
  bootStatus.textContent = '✓ Anon key set manually (' + v.slice(0, 16) + '...).';
  bootStatus.className = 'ok';
  document.getElementById('manual-key').style.display = 'none';
  if (token) sendBtn.disabled = false;
});

(async () => {
  try {
    anonKey = await extractAnonKey();
    bootStatus.textContent = '✓ Anon key loaded from bundle (' + anonKey.slice(0, 16) + '...).';
    bootStatus.className = 'ok';
  } catch (e) {
    bootStatus.textContent = '✗ Auto-extract failed: ' + e.message;
    bootStatus.className = 'err';
    document.getElementById('manual-key').style.display = 'block';
  }
  checkAuthAndEnable();
})();

sendBtn.addEventListener('click', async () => {
  sendBtn.disabled = true;
  sendBtn.textContent = 'Sending...';
  resultPre.textContent = '';
  resultPre.className = '';
  try {
    const res = await fetch(SUPABASE_URL + '/functions/v1/send-tournament-message', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + token,
        'apikey': anonKey,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ message_id: MESSAGE_ID })
    });
    const data = await res.json();
    resultPre.textContent = 'STATUS: ' + res.status + '\n\n' + JSON.stringify(data, null, 2);
    resultPre.className = res.ok ? 'ok' : 'err';
  } catch (e) {
    resultPre.textContent = 'NETWORK ERROR: ' + e.message;
    resultPre.className = 'err';
  } finally {
    sendBtn.textContent = 'Send Again';
    sendBtn.disabled = false;
  }
});
</script>
</body>
</html>
